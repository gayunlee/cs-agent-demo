# 환불/해지 조건 체인 Single Source of Truth
#
# ⚠️⚠️⚠️ 현재 사용 상태 (2026-04-05) ⚠️⚠️⚠️
# 이 YAML은 `src/domain/diagnose_engine.py` + `src/tools/workflow_tools.py::diagnose_refund_case`
# 가 참조하는 구조로 설계됐지만, 실제 대시보드/평가 경로는
# legacy `src/workflow.py` (Python if/else) 를 사용 중.
# 오늘(2026-04-05) 세션에서 T4/T7/T8/auto_payment/cancel_check 체인과 키워드를 추가했으나,
# 이것들은 **현재 실제로는 호출되지 않음** (src/agents/wrapper_agent.py 는 RefundAgentV2 래핑).
# → 4/6 이후 wrapper agent 가 diagnose_refund_case tool 을 쓰도록 전환되면 활성화됨.
# → 지금 상태에서 수정해도 동작에는 영향 없음 (dead code 상태).
#
# 설계 원칙 (Gayoon visibility_chain.yaml 패턴):
# - 진단(DiagnoseEngine), Harness, Knowledge handler가 전부 이 파일을 참조
# - 규칙 변경 시 이 파일만 수정
# - check 표현식 = Turing-incomplete DSL (field.path == 'VALUE', has_keyword(text, 'kw'), AND/OR)
# - 순서가 체크 순서 — 첫 실패에서 멈추고 first_failure 반환
# - fail_template 있으면 → 실패 시 해당 템플릿으로 답변
# - fail_message의 {placeholder}는 context 값으로 치환됨
#
# ⚠️ paymentCycle은 "결제 회차(카운트)"지 주기(개월) 아님
#    → 주기는 상품명 파싱으로 얻음. YAML에서 이 필드 참조 금지.
#
# ⚠️ 복잡한 계산(환불 금액, 주기 추정)은 DSL로 표현 불가 → tool 내부에서 처리
#    YAML chain은 "라우팅 조건"과 "단순 가드"만 담당

chains:

  # ─────────────────────────────────────────────────────────
  # 라우팅 체인 — 어느 템플릿을 쓸지 결정
  # 각 체인은 "이 시나리오에 매칭되는가?"를 평가
  # ─────────────────────────────────────────────────────────

  is_card_change_inquiry:
    label: "카드 변경 문의"
    description: "유저 메시지에 카드 변경 키워드가 있으면 T8"
    requires:
      - id: CARD1
        check: "has_keyword(user_text, 'card_change_keywords')"
        fail_message: "카드 변경 키워드 없음"
    on_pass_template: T8_카드변경_안내

  is_auto_payment_complaint:
    label: "자동결제 불만 (T4 리텐션)"
    description: "유저 메시지에 자동/정기결제 키워드 + 이전 턴 T2 아님 → T4 리텐션 설명"
    requires:
      - id: APC1
        check: "has_keyword(user_text, 'auto_payment_keywords')"
        fail_message: "자동결제 시그널 없음"
      - id: APC2
        check: "ctx.prev_had_t2 == False"
        fail_message: "이전 턴 T2 있음 (T3로 가야 함)"
    on_pass_template: T4_자동결제_설명

  is_cancel_check_inquiry:
    label: "해지 신청 처리 확인 (T7)"
    description: "유저가 '해지 신청했는데 처리됐나요?' 묻는 경우 → T7. 해지 단어 필수 + 확인 의도 키워드"
    requires:
      - id: CCI1
        check: "has_keyword(user_text, 'cancellation_target_keywords')"
        fail_message: "해지 단어 없음"
      - id: CCI2
        check: "has_keyword(user_text, 'cancel_check_keywords')"
        fail_message: "확인 의도 키워드 없음"
    on_pass_template: T7_해지_확인_완료

  is_prev_turn_t2_followup:
    label: "이전 턴 T2 → T3 전환"
    description: "직전 턴에 T2 환불 규정 안내했고 매니저 응답 있으면 → T3"
    requires:
      - id: PREV1
        check: "ctx.prev_had_t2 == True"
        fail_message: "이전 턴 T2 없음"
      - id: PREV2
        check: "ctx.prev_manager_count >= 1"
        fail_message: "매니저 응답 없음"
    on_pass_template: T3_환불_접수_완료

  needs_user_identification:
    label: "본인 확인 필요"
    description: "us_user_id 없으면 T6 또는 T6b (이전 T6 있으면 재질문)"
    requires:
      - id: USER1
        check: "ctx.us_user_id == ''"
        fail_message: "본인 확인 완료"

  is_other_person_number:
    label: "가족/타인 번호 시그널"
    description: "유저 메시지에 가족 번호 등 시그널 → T6b"
    requires:
      - id: OTHER1
        check: "has_keyword(user_text, 'other_person_number_keywords')"
        fail_message: "타인 번호 시그널 없음"
    on_pass_template: T6b_본인확인_재질문

  is_refund_urging:
    label: "환불 지연 재촉"
    description: "진행 중 환불 건이 있고 유저가 재촉 → T12"
    requires:
      - id: URGE1
        check: "is_not_empty(ctx.refunds)"
        fail_message: "환불 이력 없음"
      - id: URGE2
        check: "has_keyword(user_text, 'urging_keywords')"
        fail_message: "재촉 시그널 없음"
    on_pass_template: T12_환불진행_상태안내

  has_no_payment:
    label: "결제 이력 없음"
    description: "success_txs 비어있으면 T1 (해지 방법 안내)"
    requires:
      - id: PAY1
        check: "is_empty(ctx.success_txs)"
        fail_message: "결제 이력 존재"
    on_pass_template: T1_구독해지_방법_앱

  is_all_refunded:
    label: "전부 환불됨"
    description: "모든 결제가 환불된 상태 → T3 또는 LLM fallback"
    requires:
      - id: REF1
        check: "ctx.all_refunded == True"
        fail_message: "미환불 결제 존재"
    on_pass_template: T3_환불_접수_완료

  is_all_refunded_with_new_question:
    label: "전부 환불 후 추가 질문"
    description: "전부 환불됐는데 재결제/재가입/예외 질문 → LLM fallback"
    requires:
      - id: REFQ1
        check: "ctx.all_refunded == True"
        fail_message: "전부 환불 아님"
      - id: REFQ2
        check: "has_keyword(user_text, 'post_refund_question_keywords')"
        fail_message: "추가 질문 시그널 없음"
    on_pass_template: T_LLM_FALLBACK

  is_refund_withdrawal:
    label: "환불 철회/예외 요청"
    description: "환불 취소하고 싶다거나 예외 전액환불 요청 → LLM fallback"
    requires:
      - id: WD1
        check: "has_keyword(user_text, 'refund_withdrawal_or_exception_keywords')"
        fail_message: "철회/예외 시그널 없음"
    on_pass_template: T_LLM_FALLBACK

  is_product_change:
    label: "상품 변경 + 차액 환불"
    description: "유저가 상품 변경 의도 표현 → T10"
    requires:
      - id: PC1
        check: "has_keyword(user_text, 'product_change_keywords')"
        fail_message: "상품 변경 시그널 없음"
    on_pass_template: T10_상품변경_차액환불

  is_duplicate_payment:
    label: "중복/이중 결제"
    description: "미환불 결제 2건 이상이고 중복 의도 표현 → T11"
    requires:
      - id: DUP1
        check: "unrefunded_count(ctx.success_txs, ctx.refund_txs) >= 2"
        fail_message: "미환불 결제 2건 미만"
      - id: DUP2
        check: "has_keyword(user_text, 'duplicate_payment_keywords')"
        fail_message: "중복 의도 시그널 없음"
    on_pass_template: T11_중복결제_환불선택

  can_refund_normally:
    label: "정상 환불 처리 (T2)"
    description: "미환불 결제 있고 계산 가능 → T2"
    requires:
      - id: REFN1
        check: "is_not_empty(ctx.success_txs)"
        fail_message: "결제 이력 없음"
      - id: REFN2
        check: "ctx.all_refunded == False"
        fail_message: "전부 환불됨"
    on_pass_template: T2_환불_규정_금액

  # ─────────────────────────────────────────────────────────
  # Phase 5-A — Edge 라우팅 체인 5개 (2026-04-05 추가)
  # 2026-04-04 노트 18:30의 5패턴 매핑 기반.
  # refund_edge_reclassified.json 48건 (A_워크플로우 38 + B_LLM 10).
  # 새 텍스트 템플릿 0개, 새 tool 0개 — 기존 리소스 재사용.
  # ─────────────────────────────────────────────────────────

  is_system_error:
    label: "시스템/기술 오류 (앱/로그인/라이브/다운로드)"
    description: "기술 지원 필요 → LLM fallback → handoff_to_human 라우팅"
    requires:
      - id: SYS1
        check: "has_keyword(user_text, 'system_error_keywords')"
        fail_message: "시스템 오류 시그널 없음"
    on_pass_template: T_LLM_FALLBACK

  is_compound_issue:
    label: "복합 이슈 (환불+기술+해지 등 2개 이상)"
    description: "여러 도메인 엮인 이슈 → 상담사 인계"
    requires:
      - id: CMP1
        check: "has_keyword(user_text, 'compound_issue_keywords')"
        fail_message: "복합 시그널 없음"
    on_pass_template: T_LLM_FALLBACK

  is_emotional_escalation:
    label: "감정 폭발/강한 불만"
    description: "유저가 강한 감정 표현(욕설/분노/좌절) → LLM fallback + emotional opener"
    requires:
      - id: EMO1
        check: "has_keyword(user_text, 'emotional_distress_keywords')"
        fail_message: "감정 시그널 없음"
    on_pass_template: T_LLM_FALLBACK

  is_flow_cancellation:
    label: "진행 중 flow 철회"
    description: "환불/해지 요청 후 취소 의사 → handle_cancellation_of_flow"
    requires:
      - id: CNCL1
        check: "has_keyword(user_text, 'flow_cancellation_keywords')"
        fail_message: "철회 시그널 없음"
    on_pass_template: T_LLM_FALLBACK

  is_exception_refund_request:
    label: "예외 환불 요청 (규정 외 사유)"
    description: "건강 사유/특별 상황/규정 예외 요청 → 매니저 재량 판단 → LLM fallback"
    requires:
      - id: EXC1
        check: "has_keyword(user_text, 'exception_refund_keywords')"
        fail_message: "예외 시그널 없음"
    on_pass_template: T_LLM_FALLBACK

# ─────────────────────────────────────────────────────────
# 라우팅 순서 (DiagnoseEngine이 first_passing_chain으로 순회)
# workflow.py의 run_workflow() if/else 순서와 동일
# ─────────────────────────────────────────────────────────

routing_order:
  - is_card_change_inquiry        # Node 0: 카드 문의 (최우선)
  # ── Phase 5-A edge 라우팅 (조기 필터링, 비즈니스 체인보다 앞) ──
  - is_system_error               # Edge: 기술 오류 → handoff
  - is_compound_issue             # Edge: 복합 이슈 → handoff
  - is_emotional_escalation       # Edge: 감정 폭발 → LLM + opener
  - is_flow_cancellation          # Edge: 철회 → handle_cancellation
  - is_exception_refund_request   # Edge: 예외 환불 사유 → LLM
  # ── 기존 비즈니스 체인 ──
  - is_prev_turn_t2_followup      # Node 1: 이전 턴 T2 → T3
  - needs_user_identification     # Node 2: 본인 확인 (tool 내부에서 T6/T6b 분기)
  - is_other_person_number        # Branch D: 타인 번호 시그널
  - is_cancel_check_inquiry       # Node 3: 해지 신청 처리 확인 → T7 (2026-04-05 추가)
  - is_refund_urging              # Branch C: 환불 지연 재촉
  - has_no_payment                # Node 4: 결제 없음
  - is_all_refunded_with_new_question  # Node 5 fallback
  - is_all_refunded               # Node 5: 전부 환불됨
  - is_refund_withdrawal          # Fallback: 철회/예외
  - is_auto_payment_complaint     # Branch A0: 자동결제 불만 → T4 (T2보다 먼저, 2026-04-05 추가)
  - is_product_change             # Branch A: 상품 변경
  - is_duplicate_payment          # Branch B: 중복 결제
  - can_refund_normally           # Node 6: 정상 환불 (T2)

