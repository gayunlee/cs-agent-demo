# 환불/해지 조건 체인 Single Source of Truth (v2 — LLM intent 기반)
#
# 2026-04-06 리팩토링:
# - has_keyword 전부 제거. 키워드 매칭은 실패 확률 높음 (false positive/negative).
# - **LLM 이 intent 를 판단** (SYSTEM_PROMPT 로 가이드), 결과를 ctx.intent 에 주입.
# - YAML 은 **ctx.intent + ctx.데이터_필드** 조합으로 라우팅만 담당.
# - 복잡한 계산 (환불금, 날짜) 은 tool 내부에서 처리 (DSL 표현 불가).
#
# intent enum (LLM 이 판단해서 넘기는 값):
#   환불_요청, 해지_방법, 해지_확인, 자동결제_불만, 환불_규정_문의,
#   카드변경, 상품변경, 중복결제, 환불지연, 환불철회, 예외환불,
#   감정폭발, 시스템오류, 복합이슈, 기타
#
# check 표현식 = Turing-incomplete DSL:
#   ctx.field == 'VALUE', is_empty(), is_not_empty(), len(), in 등
#   has_keyword 는 사용하지 않음.

chains:

  # ─── 카드변경 ───
  route_card_change:
    label: "카드 변경 문의 → T8"
    requires:
      - id: CC1
        check: "ctx.intent == '카드변경'"
        fail_message: "intent 가 카드변경 아님"
    on_pass_template: T8_카드변경_안내
    tools_required: ["compose_template_answer"]

  # ─── 시스템오류 → handoff ───
  route_system_error:
    label: "시스템/기술 오류 → LLM fallback + handoff"
    requires:
      - id: SE1
        check: "ctx.intent == '시스템오류'"
        fail_message: "intent 가 시스템오류 아님"
    on_pass_template: T_LLM_FALLBACK
    tools_required: ["handoff_to_human"]

  # ─── 감정 폭발 → LLM ───
  route_emotional:
    label: "감정 폭발/강한 불만 → LLM fallback"
    requires:
      - id: EM1
        check: "ctx.intent == '감정폭발'"
        fail_message: "intent 가 감정폭발 아님"
    on_pass_template: T_LLM_FALLBACK
    tools_required: []

  # ─── 복합 이슈 → handoff ───
  route_compound:
    label: "복합 이슈 → LLM fallback + handoff"
    requires:
      - id: CP1
        check: "ctx.intent == '복합이슈'"
        fail_message: "intent 가 복합이슈 아님"
    on_pass_template: T_LLM_FALLBACK
    tools_required: ["handoff_to_human"]

  # ─── 환불 철회 → LLM ───
  route_refund_withdrawal:
    label: "환불 철회 (다시 이용할게요) → LLM fallback"
    requires:
      - id: RW1
        check: "ctx.intent == '환불철회'"
        fail_message: "intent 가 환불철회 아님"
    on_pass_template: T_LLM_FALLBACK
    tools_required: []

  # ─── 예외환불 → LLM ───
  route_exception_refund:
    label: "예외 환불 (건강 사유 등) → LLM fallback"
    requires:
      - id: EX1
        check: "ctx.intent == '예외환불'"
        fail_message: "intent 가 예외환불 아님"
    on_pass_template: T_LLM_FALLBACK
    tools_required: []

  # ─── 이전 턴 T2 → T3 전환 ───
  route_t2_followup:
    label: "이전 턴 T2 견적 후 확정 → T3 접수완료"
    requires:
      - id: T2F1
        check: "ctx.prev_had_t2 == True"
        fail_message: "이전 턴 T2 없음"
    on_pass_template: T3_환불_접수_완료
    tools_required: ["compose_template_answer"]

  # ─── 본인확인 필요 (유저 미식별) ───
  route_identity_check:
    label: "본인 확인 필요 → T6"
    requires:
      - id: ID1
        check: "ctx.us_user_id == ''"
        fail_message: "본인 확인 완료"
    on_pass_template: T6_본인확인_요청
    tools_required: ["compose_template_answer"]

  # ─── 해지 확인 ───
  route_cancel_check:
    label: "해지 처리 확인 → T7"
    requires:
      - id: CK1
        check: "ctx.intent == '해지_확인'"
        fail_message: "intent 가 해지_확인 아님"
    on_pass_template: T7_해지_확인_완료
    tools_required: ["compose_template_answer"]

  # ─── 환불 지연 재촉 ───
  route_refund_delay:
    label: "환불 지연 재촉 → T12"
    requires:
      - id: RD1
        check: "ctx.intent == '환불지연'"
        fail_message: "intent 가 환불지연 아님"
      - id: RD2
        check: "is_not_empty(ctx.refunds)"
        fail_message: "환불 이력 없음"
    on_pass_template: T12_환불진행_상태안내
    tools_required: ["compose_template_answer"]

  # ─── 결제 없음 → 해지 방법 안내 ───
  route_no_payment:
    label: "결제 이력 없음 → T1 해지 방법"
    requires:
      - id: NP1
        check: "ctx.intent == '해지_방법' or ctx.intent == '환불_요청' or ctx.intent == '환불_규정_문의'"
        fail_message: "intent 가 해지/환불 아님"
      - id: NP2
        check: "is_empty(ctx.success_txs)"
        fail_message: "결제 이력 존재"
    on_pass_template: T1_구독해지_방법_앱
    tools_required: ["compose_template_answer"]

  # ─── 전부 환불됨 ───
  route_all_refunded:
    label: "전부 환불 완료 → T3"
    requires:
      - id: AR1
        check: "ctx.intent == '환불_요청' or ctx.intent == '환불_규정_문의'"
        fail_message: "intent 가 환불 아님"
      - id: AR2
        check: "ctx.latest_refunded == True"
        fail_message: "미환불 결제 존재"
    on_pass_template: T3_환불_접수_완료
    tools_required: ["compose_template_answer"]

  # ─── 자동결제 불만 ───
  route_auto_payment:
    label: "자동결제 불만 → T4 리텐션"
    requires:
      - id: AP1
        check: "ctx.intent == '자동결제_불만'"
        fail_message: "intent 가 자동결제_불만 아님"
    on_pass_template: T4_자동결제_설명
    tools_required: ["compose_template_answer"]

  # ─── 상품 변경 ───
  route_product_change:
    label: "상품 변경 → T10"
    requires:
      - id: PC1
        check: "ctx.intent == '상품변경'"
        fail_message: "intent 가 상품변경 아님"
    on_pass_template: T10_상품변경_차액환불
    tools_required: ["compose_template_answer"]

  # ─── 중복 결제 ───
  route_duplicate_payment:
    label: "중복 결제 → T11"
    requires:
      - id: DP1
        check: "ctx.intent == '중복결제'"
        fail_message: "intent 가 중복결제 아님"
    on_pass_template: T11_중복결제_환불선택
    tools_required: ["compose_template_answer"]

  # ─── 정상 환불 (T2 금액 계산) — 마지막 fallback ───
  route_normal_refund:
    label: "정상 환불 → T2 (금액 계산 필요)"
    requires:
      - id: NR1
        check: "ctx.intent == '환불_요청' or ctx.intent == '환불_규정_문의' or ctx.intent == '해지_방법'"
        fail_message: "intent 가 환불/해지 아님"
      - id: NR2
        check: "is_not_empty(ctx.success_txs)"
        fail_message: "결제 이력 없음"
      - id: NR3
        check: "ctx.latest_refunded == False"
        fail_message: "이미 환불됨"
    on_pass_template: T2_환불_규정_금액
    tools_required: ["calculate_refund_amount", "compose_template_answer"]


# ─────────────────────────────────────────────────────────
# 라우팅 순서 (DiagnoseEngine 이 first_passing_chain 으로 순회)
# intent 기반이므로 키워드 충돌 없음. 순서는 우선순위.
# ─────────────────────────────────────────────────────────

routing_order:
  - route_card_change           # 카드변경 (최우선)
  - route_system_error          # 시스템오류 → handoff
  - route_compound              # 복합이슈 → handoff
  - route_emotional             # 감정폭발 → LLM
  - route_refund_withdrawal     # 환불철회 → LLM
  - route_exception_refund      # 예외환불 → LLM
  - route_t2_followup           # 이전 턴 T2 → T3 (데이터 기반)
  - route_identity_check        # 유저 미식별 → T6 (데이터 기반)
  - route_cancel_check          # 해지 확인 → T7
  - route_refund_delay          # 환불 지연 → T12
  - route_no_payment            # 결제 없음 → T1
  - route_all_refunded          # 전부 환불 → T3
  - route_auto_payment          # 자동결제 불만 → T4
  - route_product_change        # 상품변경 → T10
  - route_duplicate_payment     # 중복결제 → T11
  - route_normal_refund         # 정상 환불 → T2 (마지막)
