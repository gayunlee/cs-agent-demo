# 답변 템플릿 Single Source of Truth
# src/templates.py의 TEMPLATES dict를 이식.
# 각 템플릿은 compose_template tool이 YAML을 로드해서 결정론적 렌더링.

templates:

  T1_구독해지_방법_앱:
    display_name: "구독해지 방법 안내 (앱)"
    required_slots: []
    text: |
      안녕하세요 회원님,
      다음 정기결제 구독해지방법 안내드립니다.

      ■정기결제 구독해지 방법
      ①어스플러스 앱 접속
      ②우측 상단 my 클릭 → 멤버십 관리 클릭
      ③회색글씨로 된 <내역보기> 클릭
      ④구독해지 클릭

      ❗주의사항
      -구독해지 신청은 다음 정기결제에 대한 해지입니다.
      -현재 구독 기간까지는 정상 이용 가능합니다.

  T1_구독해지_방법_웹:
    display_name: "구독해지 방법 안내 (웹)"
    required_slots: []
    text: |
      안녕하세요 회원님,
      다음 정기결제 구독해지방법 안내드립니다.

      ■정기결제 구독해지 방법
      ①어스플러스 홈페이지 접속
      https://us-insight.com/
      ②우측 상단 my 클릭 → 멤버십 관리 클릭
      ③회색글씨로 된 <내역보기> 클릭
      ④구독해지 클릭

      ❗주의사항
      -구독해지 신청은 다음 정기결제에 대한 해지입니다.
      -현재 구독 기간까지는 정상 이용 가능합니다.

  T2_환불_규정_금액:
    display_name: "환불 규정 + 금액 안내 (부분환불)"
    required_slots: [환불금액]
    text: |
      안녕하세요 회원님, 문의 주셔서 감사합니다.

      현재 어스플러스는 7일 이내 구독권 미개시 시, 전액 환불 접수를 도와드리나
      구독권 개시 시, 환불 규정에 따른 금액으로 차감하여 환불이 진행됩니다.

      회원님께서는 현재 열람이 시작(구독권 개시)되어 일부 환불금 차감 되어 진행됩니다.
      이용에 따라 1개월 정가 금액이 차감이 되며, 잔여 금액에서의 10% 수수료 차감되어 환불 진행됩니다.

      ■ 환불 금액: {환불금액}원

      상기 환불금액 확인부탁드리며, 말씀주시면 즉시 환불 접수 도와드리도록 하겠습니다.
      환불 시 구독권은 즉시 종료되는 점 안내드립니다.

  T2_환불_규정_전액:
    display_name: "환불 규정 + 금액 안내 (전액환불)"
    required_slots: [결제금액, 환불금액]
    text: |
      안녕하세요 회원님, 문의 주셔서 감사합니다.

      확인 결과 결제일로부터 7일 이내이며, 구독권 미개시 상태로
      전액 환불이 가능하십니다.

      ■ 결제 금액: {결제금액}원
      ■ 환불 금액: {환불금액}원 (전액)

      환불 진행 희망하시면 말씀 부탁드립니다.
      환불 시 구독권은 즉시 종료되는 점 안내드립니다.

  T3_환불_접수_완료:
    display_name: "환불 접수 완료"
    required_slots: []
    text: |
      네 회원님, 환불 접수 완료되었습니다.

      카드 결제를 해주시어 결제해주신 카드 취소로 진행될 예정입니다.
      카드사 반영까지는 영업일 기준 최대 3일 정도 소요되실 수 있습니다.
      감사합니다.

      [환불 안내사항]
      1. 최종 카드 환불의 경우 카드사 사정으로 인해 환불접수일로부터 영업일 기준 최대 3일가량 소요될 수 있습니다.
      2. 취소 완료 시, 카드사에서 안내해 드리는 SMS는 회원님의 수신 설정 여부에 따라 미수신 될 수 있습니다.
      3. 환불 접수 완료 시, 구독권은 즉시 종료됩니다.

  T4_자동결제_설명:
    display_name: "자동결제/정기결제 설명 (리텐션 포함)"
    required_slots: [마스터명, 이전결제월, 현재결제월]
    text: |
      안녕하세요, 회원님. 문의 주셔서 감사합니다.
      {마스터명} 마스터 과정을 함께해 주시고 꾸준히 학습해 주심에 진심으로 감사드립니다.
      본 과정은 정기적으로 제공되는 콘텐츠를 통해 투자 학습을 이어가는 구독형 스터디입니다.
      회원님께서는 지난 {이전결제월} 과정에 이어 {현재결제월} 과정의 정기결제가 진행되었습니다.
      정기결제는 최초 결제 시 상세히 안내드렸으며, 회원님께서 안내 확인 후 동의 및 카드 정보 등록을 해주신 내용에 따라 자동 결제가 진행되고 있습니다.

      회원님께서 환불 혹은 다음 결제 해지 요청을 주신다면 언제든지 해지 도와드릴 수 있습니다.
      회원님, 이용하시면서 불편하셨던 점이 있으셨을까요?

  T6_본인확인_요청:
    display_name: "본인확인 요청"
    required_slots: []
    text: |
      안녕하세요 회원님, 문의 주셔서 감사합니다.
      성함/휴대전화 번호 말씀 주시면 확인 도와드리도록 하겠습니다.

  T6b_본인확인_재질문:
    display_name: "본인확인 재질문 (불일치/가족번호)"
    required_slots: []
    text: |
      회원님, 번거로우시겠지만 한 번 더 확인이 필요합니다.
      말씀 주신 정보로는 결제자 본인 계정을 특정하기 어려워,
      결제 시 등록하신 **본인 성함**과 **가입 이메일** 또는 **결제 카드 끝 4자리** 중 하나를
      추가로 알려주시면 정확히 확인해 드리겠습니다.

      개인정보 보호를 위해 본인 계정 확인이 반드시 필요한 점 양해 부탁드립니다.

  T7_해지_확인_완료:
    display_name: "해지 확인 완료"
    required_slots: []
    text: |
      안녕하세요 회원님,
      구독해지 = 자동결제 해지 입니다 :)
      현재 구독해지 잘 되어 있으시어, 다음 결제 진행되지 않을 예정입니다.

  T7_해지_미완료:
    display_name: "해지 미완료 (구독 활성)"
    required_slots: []
    text: |
      안녕하세요 회원님,
      확인 결과 현재 구독이 아직 활성 상태입니다.
      구독해지를 원하시면 아래 방법으로 진행해 주세요.

      ■정기결제 구독해지 방법
      ①어스플러스 앱 접속
      ②우측 상단 my 클릭 → 멤버십 관리 클릭
      ③회색글씨로 된 <내역보기> 클릭
      ④구독해지 클릭

  T8_카드변경_안내:
    display_name: "카드변경 안내"
    required_slots: []
    text: |
      안녕하세요 회원님,
      결제카드 변경 방법 안내드립니다.

      ✅ 변경 방법을 안내 드립니다.

      ▶결제카드 변경: https://us-insight.com/

      1. 어스 앱이 아닌 웹페이지로 접속 해주세요.
      2. 구독 결제 해주신 계정으로 로그인 해주세요.
      3. 오른쪽 상단 'MY' 클릭 해주세요.
      4. 멤버십 관리를 눌러주세요
      5. 구독중 상품에 [결제 변경]을 눌러주세요
      6. 100원 결제 후, 카드변경이 완료됩니다.

      ※ 카드 변경 안내
      * 결제 정보 변경 시, 100원이 일시적으로 결제됩니다. 정보 변경 후, 100원이 즉시 자동으로 환불 됩니다.
      * 변경 된 결제 수단은, 다음 달 정기 결제부터 적용됩니다.

  T10_상품변경_차액환불:
    display_name: "상품 변경 + 차액 환불 (다운그레이드)"
    required_slots: [기존결제금액, 기존환불가능액, 신규상품가격, 차액환불금액]
    text: |
      안녕하세요 회원님, 상품 변경 요청 확인했습니다.

      기존 결제 건 환불 규정에 따라 계산 후, 신규 상품 금액을 차감하고 차액을 환불해 드리는 방식으로 진행됩니다.

      ■ 기존 결제 금액: {기존결제금액}원
      ■ 기존 환불 가능액: {기존환불가능액}원
      ■ 신규 상품 금액: {신규상품가격}원
      ■ 차액 환불 금액: {차액환불금액}원

      위 내용으로 진행 원하시면 말씀 부탁드립니다.
      환불 시 기존 구독권은 즉시 종료되며 신규 상품이 활성화됩니다.

  T10_상품변경_추가결제:
    display_name: "상품 변경 + 추가 결제 (업그레이드)"
    required_slots: [기존결제금액, 기존환불가능액, 신규상품가격, 차액환불금액]
    text: |
      안녕하세요 회원님, 상품 변경 요청 확인했습니다.

      기존 결제 건 환불 규정 적용 후, 신규 상품이 더 고가여서 추가 결제가 필요한 상황입니다.

      ■ 기존 결제 금액: {기존결제금액}원
      ■ 기존 환불 가능액: {기존환불가능액}원
      ■ 신규 상품 금액: {신규상품가격}원
      ■ 추가 결제 필요액: {차액환불금액}원

      진행 원하시면 말씀 부탁드립니다.

  T11_중복결제_환불선택:
    display_name: "중복/이중 결제 환불 선택"
    required_slots: [미환불건수, 결제목록]
    text: |
      안녕하세요 회원님, 확인 결과 미환불 상태의 결제가 **{미환불건수}건** 확인됩니다.

      ■ 결제 내역
      {결제목록}

      어느 건을 환불 원하시는지 알려주시면 해당 건에 대해 환불 규정에 따른 금액 계산 후 안내드리겠습니다.
      전체 환불을 원하시는 경우에도 말씀 부탁드립니다.

  T12_환불진행_상태안내:
    display_name: "환불 진행 상태 안내 (지연/미처리)"
    required_slots: [환불접수일, 환불예정금액, 상품명]
    text: |
      안녕하세요 회원님, 기다리게 해드려 죄송합니다.

      확인 결과, 지난 **{환불접수일}**에 접수하신 **{상품명}** 환불 건이 처리 대기 중으로 확인됩니다.

      ■ 환불 예정 금액: {환불예정금액}원

      카드 환불의 경우 카드사 사정으로 접수일로부터 영업일 기준 최대 3영업일가량 소요될 수 있으며,
      이 건은 처리 지연이 확인되어 담당 부서에 즉시 확인 요청 드렸습니다.
      오늘 내로 처리 상태 확인하여 재안내 드리겠습니다. 불편을 드려 다시 한 번 죄송합니다.

  T_LLM_FALLBACK:
    display_name: "LLM 자유 답변 (fallback)"
    required_slots: []
    text: "{llm_draft}"
